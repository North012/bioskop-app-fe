<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seat Map Bioskop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    .screen {
      background: #ccc;
      height: 30px;
      width: 80%;
      margin: 10px auto;
      border-radius: 5px;
      line-height: 30px;
      font-weight: bold;
    }
    .seats {
      display: grid;
      grid-template-columns: repeat(10, 40px);
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .seat {
      width: 40px;
      height: 40px;
      background-color: #eee;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }
    .seat.available { background-color: #eee; }
    .seat.booked { background-color: #e74c3c; color: white; cursor: not-allowed; }
    .seat.unavailable { background-color: #7f8c8d; color: white; cursor: not-allowed; }
    .seat.selected { background-color: #2ecc71; color: white; }
  </style>
</head>
<body>
  <h2>Peta Kursi Bioskop</h2>
  <div class="screen">LAYAR</div>
  
  <div class="seats" id="seatMap"></div>

  <script>
    // Data kursi
    const rows = ["A","B","C","D","E","F","G","H"];
    const cols = 10;

    // kursi booked/unavailable
    const bookedSeats = ["A3","A4","B5","C6","D2","D3","D4","D5","D6"];
    const unavailableSeats = ["D7","D8"];

    const seatMap = document.getElementById("seatMap");

    rows.forEach(row => {
      for(let i=1; i<=cols; i++){
        const seatId = row + i;
        const seat = document.createElement("div");
        seat.classList.add("seat");

        // kondisi kursi
        if(bookedSeats.includes(seatId)){
          seat.classList.add("booked");
        } else if(unavailableSeats.includes(seatId)){
          seat.classList.add("unavailable");
        } else {
          seat.classList.add("available");
          seat.addEventListener("click", () => {
            seat.classList.toggle("selected");
          });
        }

        seat.innerText = seatId;
        seatMap.appendChild(seat);
      }
    });
  </script>
</body>
</html>
